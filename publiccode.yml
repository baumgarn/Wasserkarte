description:
  de:
    genericName: Data visualization
    longDescription: >
      Interaktive Datenkarte der Wassermeisterei zur Visualisierung von
      Bodenfeuchte-Sensordaten. 


      Die [Wassermeisterei](https://wassermeisterei.org/) ist ein
      Citizen-Science-Projekt im Hohen Fläming. In der trockensten Region
      Deutschlands stellen Bürger\*innen Bodenfeuchte-Sensoren auf und sammeln
      Daten, um Böden besser zu verstehen und Strategien für eine
      dürre-resiliente Landschaft zu entwickeln.


      Die Umsetzung erfolgt in Zusammenarbeit zwischen dem Verein Lebendiger
      Lernort Arensnest und dem Smart-City-Modellprojekt der Stadt Bad Belzig
      [Zukunftsschusterei](https://zukunftsschusterei.de/).


      Projektleitung Wassermeisterei: Daniel Diehl
       Projektleitung Zukunftsschusterei: Malte Specht
       Design und Programmierung Wasserkarte: [Nikolaus Baumgarten](https://nikkki.net/)
    shortDescription: >-
      Interaktive Datenkarte der Wassermeisterei zur Visualisierung von
      Bodenfeuchte-Sensordaten. 
